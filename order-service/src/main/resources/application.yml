spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/order_db}
    username: ${DB_USERNAME:eoghks}
    password: ${DB_PASSWORD:eoghks_local}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_ORDER_HOST:localhost}
      port: ${REDIS_ORDER_PORT:6381}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

kafka:
  topic:
    order-created: order.created
    stock-decreased: stock.decreased
    stock-decrease-failed: stock.decrease.failed

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.ecommerce: INFO
