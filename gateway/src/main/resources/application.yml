spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**

        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/products/**

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/orders/**

        - id: monitoring-service
          uri: ${MONITORING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/monitoring/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized  # LW-04: 운영 내부 정보 노출 방지
      roles: ADMIN                   # ADMIN 역할 보유자만 상세 노출 (일반 USER 토큰 차단)

auth:
  jwks-url: ${AUTH_SERVICE_URL:http://localhost:8081}/api/v1/auth/.well-known/jwks.json
  jwks-refresh-interval-ms: 300000  # 5분마다 공개키 갱신

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.ecommerce: INFO
    org.springframework.cloud.gateway: INFO
