spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**

        - id: monitoring-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/monitoring/**

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
