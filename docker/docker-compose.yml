name: ecommerce-msa

services:
  # ───────────────────────────────────────────────
  # PostgreSQL — 서비스별 DB 분리 (한 인스턴스에 여러 DB)
  # ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eoghks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eoghks_local}
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eoghks}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ───────────────────────────────────────────────
  # Redis — 서비스별 인스턴스 분리
  # auth  : Refresh Token 세션 → volatile-lru (TTL 있는 키만 삭제)
  # product: 상품 상세 캐시   → allkeys-lru (전체 키 LRU 삭제)
  # order  : 분산락 + 캐시    → volatile-lru (락 키 보호)
  # ───────────────────────────────────────────────
  redis-auth:
    image: redis:7.2-alpine
    container_name: ecommerce-redis-auth
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "volatile-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-auth-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  redis-product:
    image: redis:7.2-alpine
    container_name: ecommerce-redis-product
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6380:6379"
    volumes:
      - redis-product-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  redis-order:
    image: redis:7.2-alpine
    container_name: ecommerce-redis-order
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "volatile-lru"]
    ports:
      - "6381:6379"
    volumes:
      - redis-order-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ───────────────────────────────────────────────
  # Zookeeper — Kafka 메타데이터 관리
  # ───────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,srvr,mntr,stat,conf"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ecommerce-net

  # ───────────────────────────────────────────────
  # Kafka — 이벤트 브로커 (Choreography Saga)
  # ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ecommerce-net

  # ───────────────────────────────────────────────
  # Kafka UI — 토픽/메시지 시각화 (개발용)
  # ───────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecommerce-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: ecommerce-msa
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8090:8080"
    networks:
      - ecommerce-net

volumes:
  postgres-data:
  redis-auth-data:
  redis-product-data:
  redis-order-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:

networks:
  ecommerce-net:
    driver: bridge
